<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Nhật Trường</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/png" href="icon-192.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tricker Hub">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        :root {
            --neon-green: #0f0; --neon-pink: #ff00ff; --neon-blue: #00ffff;
            --neon-yellow: #ffff00; --neon-red: #ff3333;
        }
        body {
            background-color: #000;
            background-image: linear-gradient(rgba(0, 255, 0, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 0, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: white; font-family: 'Courier New', Courier, monospace;
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .navbar {
            padding: 15px 20px; background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--neon-pink); display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px var(--neon-pink); z-index: 10;
        }
        .navbar img { height: 30px; border-radius: 50%; border: 1px solid var(--neon-blue); }
        .desktop { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 20px; padding: 40px 20px; justify-items: center; align-content: start; }
        .app-icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.2s; }
        .app-icon:active { transform: scale(0.9); }
        .icon-box { width: 70px; height: 70px; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; margin-bottom: 8px; border: 2px solid; background: rgba(0,0,0,0.8); }
        .icon-1 { border-color: var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        .icon-2 { border-color: var(--neon-yellow); color: var(--neon-yellow); box-shadow: 0 0 15px var(--neon-yellow); }
        .icon-3 { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }
        .window { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 450px; background: #000; border: 2px solid; display: none; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,1); z-index: 100; border-radius: 8px; }
        .window.active { display: flex; animation: openAnim 0.3s ease-out; }
        @keyframes openAnim { from { opacity: 0; transform: translate(-50%, -40%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        .win-header { padding: 12px; display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); border-bottom: 1px solid; }
        .win-content { padding: 25px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #111; color: white; border: 1px solid; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        .btn-start { width: 100%; padding: 12px; background: transparent; color: inherit; border: 1px solid; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .terminal { height: 250px; overflow-y: auto; background: #000; padding: 15px; border: 1px dashed; display: none; text-align: left; font-size: 13px; line-height: 1.5; }
        #win1 { border-color: var(--neon-blue); color: var(--neon-blue); }
        #win2 { border-color: var(--neon-yellow); color: var(--neon-yellow); }
        #win3 { border-color: var(--neon-green); color: var(--neon-green); }
    </style>
</head>
<body>
    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="icon-192.png" alt="Logo">
            <span style="color: var(--neon-pink); font-weight: bold; text-shadow: 0 0 5px var(--neon-pink);">TRICKER HUB</span>
        </div>
        <div id="clock">00:00</div>
    </div>

    <div class="desktop">
        <div class="app-icon" onclick="openWin('win1')">
            <div class="icon-box icon-1">Dame Facebook</div>
            <span>Chức năng 1</span>
        </div>
        <div class="app-icon" onclick="openWin('win2')">
            <div class="icon-box icon-2">DDoS Web</div>
            <span>Chức năng 2</span>
        </div>
        <div class="app-icon" onclick="openWin('win3')">
            <div class="icon-box icon-3">Admin</div>
            <span>Thông tin</span>
        </div>
    </div>

    <div id="win1" class="window">
        <div class="win-header"><span>MODULE 01</span> <span onclick="closeWin('win1')" style="cursor:pointer">✕</span></div>
        <div class="win-content">
            <div id="form1">
                <input type="text" placeholder="Target IP..."><input type="text" placeholder="Proxy List..."><input type="text" placeholder="Port...">
                <button class="btn-start" onclick="startProcess('term1', 'form1', 1)">BẮT ĐẦU</button>
            </div>
            <div id="term1" class="terminal"></div>
        </div>
    </div>

    <div id="win2" class="window">
        <div class="win-header"><span>MODULE 02</span> <span onclick="closeWin('win2')" style="cursor:pointer">✕</span></div>
        <div class="win-content">
            <div id="form2">
                <input type="text" placeholder="Target URL..."><input type="number" placeholder="Threads...">
                <button class="btn-start" onclick="startProcess('term2', 'form2', 2)">BẮT ĐẦU</button>
            </div>
            <div id="term2" class="terminal"></div>
        </div>
    </div>

    <div id="win3" class="window">
        <div class="win-header"><span>ADMIN INFO</span> <span onclick="closeWin('win3')" style="cursor:pointer">✕</span></div>
        <div class="win-content">
            <div style="border: 1px solid var(--neon-green); padding: 20px; background: rgba(0,255,0,0.05);">
                <h2 style="margin-top:0;">MA NHẬT TRƯỜNG</h2>
                <p>Status: [ ONLINE ]</p><p>Telegram: ma_nhat_truong </p><p>Level: God Mode</p>
            </div>
        </div>
    </div>

    <script>
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }, 1000);

        const codeLines = {
            1: [">> Report Thành Công", ">> Bật Chống Spam", ">> Đổi Tài Khoảng..."],
            2: [
                "root@Ma Nhat Truong:~# ./layer7_strike --target $URL --threads $THREADS",
                "[+] Resolving target hostname to IPv4 address... [OK]",
                "[+] Bypassing WAF (Web Application Firewall) protections... [SUCCESS]",
                "[*] Spawning concurrent workers. Active threads: 50,000.",
                "[*] Initiating HTTP/2 multiplexing POST flood...",
                "[!] Payload delivery rate: 3.2M req/sec | Traffic: 125 Gbps",
                "[!] Target response time spiking: 204ms -> 5048ms -> CONNECTION_TIMEOUT",
                "[-] Target server dropped connection. HTTP Status: 503 Service Unavailable",
                "[+] Target completely offline. Zero packets received. Operation successful."
            ]
        };


        let activeIntervals = {};
        function openWin(id) { document.getElementById(id).classList.add('active'); }
        function closeWin(id) { 
            document.getElementById(id).classList.remove('active');
            const termId = id === 'win1' ? 'term1' : 'term2';
            const formId = id === 'win1' ? 'form1' : 'form2';
            if (activeIntervals[termId]) {
                clearInterval(activeIntervals[termId]);
                document.getElementById(formId).style.display = 'block';
                document.getElementById(termId).style.display = 'none';
                document.getElementById(termId).innerHTML = '';
            }
        }
        function startProcess(termId, formId, type) {
            document.getElementById(formId).style.display = 'none';
            const term = document.getElementById(termId);
            term.style.display = 'block';
            const lines = codeLines[type]; let i = 0;
            activeIntervals[termId] = setInterval(() => {
                term.innerHTML += `<div>${lines[i]}</div>`; i++;
                if (i >= lines.length) i = 0;
                term.scrollTop = term.scrollHeight;
            }, 1000);
        }
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
