<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHIẾN TRICKER HUB</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/png" href="logo.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tricker Hub">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root {
            --neon-green: #0f0;
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-yellow: #ffff00;
        }
        body {
            background-color: #050505;
            background-image: linear-gradient(rgba(0, 255, 0, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 255, 0, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
        }
        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid var(--neon-pink);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 0 10px var(--neon-pink);
        }
        .navbar .logo { font-weight: bold; color: var(--neon-pink); text-shadow: 0 0 5px var(--neon-pink); }
        
        /* Desktop Icons */
        .desktop {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            gap: 30px;
            flex-wrap: wrap;
        }
        .icon {
            width: 120px;
            height: 120px;
            border: 2px dashed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(0,0,0,0.6);
        }
        .icon:hover { transform: scale(1.1); }
        .icon-1 { border-color: var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        .icon-2 { border-color: var(--neon-yellow); color: var(--neon-yellow); box-shadow: 0 0 15px var(--neon-yellow); }
        .icon-3 { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }

        /* Window Modal */
        .window {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 500px;
            background: #000;
            border: 2px solid;
            display: none;
            flex-direction: column;
            box-shadow: 0 0 30px;
            z-index: 100;
        }
        .window.active { display: flex; }
        .win-header {
            padding: 10px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid;
        }
        .close-btn { cursor: pointer; font-weight: bold; }
        .win-content { padding: 20px; }
        
        /* Inputs & Buttons */
        input {
            width: 90%; padding: 10px; margin-bottom: 15px;
            background: #111; color: inherit; border: 1px solid;
            font-family: inherit;
        }
        button.action-btn {
            padding: 10px 20px; background: transparent; color: inherit;
            border: 1px solid; cursor: pointer; font-weight: bold; width: 100%;
        }
        button.action-btn:hover { background: rgba(255,255,255,0.1); }

        /* Terminal */
        .terminal {
            height: 250px; overflow-y: auto; background: #000;
            padding: 10px; border: 1px dotted; display: none;
            text-align: left; font-size: 14px;
        }
        
        /* Color themes for windows */
        #win-func1 { border-color: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); color: var(--neon-blue); }
        #win-func1 .win-header { border-bottom-color: var(--neon-blue); }
        #win-func1 input, #win-func1 button { border-color: var(--neon-blue); }
        
        #win-func2 { border-color: var(--neon-yellow); box-shadow: 0 0 20px var(--neon-yellow); color: var(--neon-yellow); }
        #win-func2 .win-header { border-bottom-color: var(--neon-yellow); }
        #win-func2 input, #win-func2 button { border-color: var(--neon-yellow); }

        .admin-box { text-align: center; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">CHIẾN TRICKER OS v2.0</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="desktop">
        <div class="icon icon-1" onclick="openWin('win-func1')">
            <h2 style="margin:0">01</h2><p>[ XÂM NHẬP ]</p>
        </div>
        <div class="icon icon-2" onclick="openWin('win-func2')">
            <h2 style="margin:0">02</h2><p>[ TẤN CÔNG ]</p>
        </div>
        <div class="icon icon-3" onclick="openWin('win-func3')">
            <h2 style="margin:0">03</h2><p>[ ADMIN ]</p>
        </div>
    </div>

    <div id="win-func1" class="window">
        <div class="win-header">
            <span>MODULE_01: EXPLOIT</span>
            <span class="close-btn" onclick="closeWin('win-func1')">X</span>
        </div>
        <div class="win-content">
            <div id="form-1">
                <input type="text" placeholder="Target IP...">
                <input type="text" placeholder="Port...">
                <input type="password" placeholder="Root Key...">
                <button class="action-btn" onclick="runTerminal('term-1', 'form-1', linesFunc1)">BẮT ĐẦU</button>
            </div>
            <div id="term-1" class="terminal" style="border-color: var(--neon-blue);"></div>
        </div>
    </div>

    <div id="win-func2" class="window">
        <div class="win-header">
            <span>MODULE_02: DDOS</span>
            <span class="close-btn" onclick="closeWin('win-func2')">X</span>
        </div>
        <div class="win-content">
            <div id="form-2">
                <input type="text" placeholder="Target URL...">
                <input type="number" placeholder="Threads (e.g. 500)...">
                <button class="action-btn" onclick="runTerminal('term-2', 'form-2', linesFunc2)">BẮT ĐẦU</button>
            </div>
            <div id="term-2" class="terminal" style="border-color: var(--neon-yellow);"></div>
        </div>
    </div>

    <div id="win-func3" class="window" style="border-color: var(--neon-green); box-shadow: 0 0 20px var(--neon-green);">
        <div class="win-header" style="border-bottom-color: var(--neon-green); color: var(--neon-green);">
            <span>SYSTEM_INFO</span>
            <span class="close-btn" onclick="closeWin('win-func3')">X</span>
        </div>
        <div class="win-content admin-box">
            <h1>MA NHẬT TRƯỜNG</h1>
            <p>Role: System Owner</p>
            <p>Level: God Mode</p>
            <p>Status: ONLINE</p>
            <hr style="border: 0; border-top: 1px dashed var(--neon-green); margin: 20px 0;">
            <p style="font-size: 12px; opacity: 0.8;">Hệ thống được bảo vệ bởi Tricker Protocol.</p>
        </div>
    </div>

    <script>
        // Đồng hồ
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('vi-VN');
        }, 1000);

        // Data code chạy cho 2 chức năng
        const linesFunc1 = [
            ">> [SYSTEM] Đang giải mã module 01...",
            ">> [EXPLOIT] Injecting payload v3.1...",
            ">> [SUCCESS] Đã chiếm quyền điều khiển!"
        ];
        const linesFunc2 = [
            ">> [DDOS] Khởi tạo 500 threads tấn công...",
            ">> [NETWORK] Sending ACK/SYN flood...",
            ">> [STATUS] Server mục tiêu đã sập!"
        ];

        let intervals = {};

        function openWin(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeWin(id) {
            document.getElementById(id).classList.remove('active');
            // Reset form khi đóng
            if(id === 'win-func1') resetForm('form-1', 'term-1');
            if(id === 'win-func2') resetForm('form-2', 'term-2');
        }

        function resetForm(formId, termId) {
            document.getElementById(formId).style.display = 'block';
            document.getElementById(termId).style.display = 'none';
            document.getElementById(termId).innerHTML = '';
            if(intervals[termId]) clearInterval(intervals[termId]);
        }

        function runTerminal(termId, formId, linesArray) {
            document.getElementById(formId).style.display = 'none';
            const term = document.getElementById(termId);
            term.style.display = 'block';
            term.innerHTML = "Khởi chạy tiến trình...<br><br>";
            
            let i = 0;
            intervals[termId] = setInterval(() => {
                term.innerHTML += linesArray[i] + "<br>";
                i++;
                if(i >= linesArray.length) i = 0; // Lặp lại từ đầu
                term.scrollTop = term.scrollHeight; // Cuộn xuống cuối
            }, 1000);
        }

        // Kích hoạt Service Worker để biến thành App PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
